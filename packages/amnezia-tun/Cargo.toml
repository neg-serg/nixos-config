[package]
name = "amnezia-tun"
version = "0.1.0"
edition = "2021"
description = "AmneziaVPN config decoder — extracts sing-box compatible JSON"

[dependencies]
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
base64 = "0.22"
regex = "1"
anyhow = "1"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
strip = "symbols"
panic = "abort"
debug = "line-tables-only"
