[package]
name = "rofiw"
version = "0.1.0"
edition = "2021"
description = "Rofi wrapper with auto-computed panel offsets from Quickshell theme + Hyprland monitor scale"

[dependencies]
clap = { version = "4", features = ["derive", "env"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
