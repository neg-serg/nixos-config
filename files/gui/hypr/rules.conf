windowrule {
    name = nm-connection-editor
    match:class = ^(nm-connection-editor)$
    float = yes
    size = 45%
    center = yes
    tag = nm-connection-editor
}

windowrule {
    name = picture-in-picture
    match:title = $pip_match
    float = yes
    keep_aspect_ratio = yes
    move = 73% 72%
    size = 25%
    pin = yes
    tag = pip
}

windowrule {
    name = file-dialog
    match:title = $file_dialog_match
    center = yes
    float = yes
    tag = file-dialog
}

windowrule {
    name = telegram-wrapped
    match:class = $telegram_wrapped_match
    center = yes
    tag = telegram
}

windowrule {
    name = telegram-org
    match:class = $telegram_org_match
    float = yes
    tag = telegram
}

windowrule {
    name = utility
    match:class = $utility_match
    float = yes
    tag = utility
}

windowrule {
    name = mpd-add
    match:class = $mpd_add_match
    float = yes
    size = 35%
    move = 64% 59%
    tag = mpd-add
}

windowrule {
    name = im-scratchpad
    match:class = $im_scratchpad
    float = yes
}

windowrule {
    name = music-scratchpad
    match:class = $music_scratchpad
    float = yes
}

windowrule {
    name = mail-scratchpad
    match:class = $mail_scratchpad
    float = yes
}

windowrule {
    name = mixer-scratchpad
