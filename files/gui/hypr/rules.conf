layerrule {
    name = xray-all
    match:namespace = .*
    xray = yes
}

layerrule {
    name = no-anim-vicinae
    match:namespace = vicinae
    no_anim = yes
}

layerrule {
    name = no-anim-selection
    match:namespace = selection
    no_anim = yes
}

layerrule {
    name = no-anim-indicator
    match:namespace = indicator.*
    no_anim = yes
}

layerrule {
    name = no-anim-hyprpicker
    match:namespace = hyprpicker
    no_anim = yes
}

layerrule {
    name = blur-gtk-layer-shell
    match:namespace = gtk-layer-shell
    blur = yes
    ignore_alpha = 0
}

layerrule {
    name = blur-vicinae
    match:namespace = vicinae
    blur = yes
    ignore_alpha = 0.6
}

layerrule {
    name = blur-launcher
    match:namespace = launcher
    blur = yes
    ignore_alpha = 0.5
}

layerrule {
    name = blur-notifications
    match:namespace = notifications
    blur = yes
    ignore_alpha = 0.69
}

layerrule {
    name = blur-logout-dialog
    match:namespace = logout_dialog
    blur = yes
}

layerrule {
    name = slide-left
    match:namespace = sideleft.*
    animation = slide left
}

layerrule {
    name = slide-right
    match:namespace = sideright.*
    animation = slide right
}

layerrule {
    name = blur-session
    match:namespace = session[0-9]*
    blur = yes
}

layerrule {
    name = blur-bar
    match:namespace = bar[0-9]*
    blur = yes
    ignore_alpha = 0.6
}

layerrule {
    name = blur-barcorner
    match:namespace = barcorner.*
    blur = yes
    ignore_alpha = 0.6
}

layerrule {
    name = blur-dock
    match:namespace = dock[0-9]*
    blur = yes
    ignore_alpha = 0.6
}

layerrule {
    name = blur-overview
    match:namespace = overview[0-9]*
    blur = yes
    ignore_alpha = 0.6
}

layerrule {
    name = blur-cheatsheet
    match:namespace = cheatsheet[0-9]*
    blur = yes
    ignore_alpha = 0.6
}

layerrule {
    name = blur-sideright
    match:namespace = sideright[0-9]*
    blur = yes
    ignore_alpha = 0.6
}

layerrule {
    name = blur-sideleft
    match:namespace = sideleft[0-9]*
    blur = yes
    ignore_alpha = 0.6
}

layerrule {
    name = blur-indicator
    match:namespace = indicator.*
    blur = yes
    ignore_alpha = 0.6
}

layerrule {
    name = blur-osk
    match:namespace = osk[0-9]*
    blur = yes
    ignore_alpha = 0.6
}

windowrule {
    name = suppress-maximize
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = yes
    match:float = yes
    match:fullscreen = no
    match:pin = no
    no_focus = yes
}

windowrule {
    name = no-blur-xwayland
    match:xwayland = yes
    no_blur = yes
}

windowrule {
    name = tag-xwayland
    match:xwayland = yes
    tag = xwayland
}

windowrule {
    name = pinentry
    match:class = (pinentry-)(.*)
    stay_focused = yes
    tag = pinentry
}

windowrule {
    name = file-manager
    match:class = $file_manager_match
    opacity = 0.92
    tag = file-manager
}

windowrule {
    name = xwayland-video-bridge
    match:class = $xwaylandvideobridge_match
    opacity = 0.0 override
    no_anim = yes
    no_initial_focus = yes
    max_size = 1 1
    no_blur = yes
    tag = xwaylandvideobridge
}

