    float = yes
}

windowrule {
    name = torrment-scratchpad
    match:class = $torrment_scratchpad
    float = yes
}

windowrule {
    name = teardown-scratchpad
    match:class = $teardown_scratchpad
    float = yes
}

windowrule {
    name = wine-exe
    match:title = .*\.exe
    immediate = yes
    tag = wine-exe
}

windowrule {
    name = steam-app-generic
    match:class = $steam_app_match
    immediate = yes
    tag = steam-app
    no_shadow = yes
}

