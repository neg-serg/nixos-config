# Virtual stereo sink for games that refuse to work with multi-channel
# pro-audio interfaces (Unity, FMOD, older SDL, etc.).
#
# This loopback creates actual playback ports (playback_FL / playback_FR)
# that can be routed to hardware via pw-link. The wp-hdspe-default systemd
# service handles the routing to RME AUX0/AUX1 with retries.
#
# No hardcoded target.object or node.target — the sink is created
# unconditionally at PipeWire start, and routing follows asynchronously
# when the hardware ALSA node becomes available.

context.modules = [
    {   name = libpipewire-module-loopback
        args = {
            capture.props = {
                media.class = Audio/Sink
                audio.position = [ FL FR ]
                node.name = game-stereo
                node.description = "Game Stereo"
                priority.session = 1200
            }
            playback.props = {
                node.name = "playback.game-stereo"
                audio.position = [ FL FR ]
            }
        }
    }
]
