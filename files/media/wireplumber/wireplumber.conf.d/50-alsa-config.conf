monitor.alsa.rules = [
  {
    # Disable suspend for all ALSA cards
    matches = [
      {
        device.name = "~alsa_card.*"
      }
    ]
    actions = {
      update-props = {
        session.suspend-timeout-seconds = 0
      }
    }
  },
  {
    # RME HDSPe AIO Pro: pro-audio profile for per-channel routing
    matches = [
      { alsa.card_name = "~RME AIO*" }
      { alsa.card_id = "~HDSPe*" }
    ]
    actions = {
      update-props = {
        device.profile = "pro-audio"
        api.alsa.period-size = 256
        api.alsa.headroom = 256
        api.alsa.disable-batch = true
        node.nick = "RME AIO Pro"
        priority.session = 0
        priority.driver = 0
        session.suspend-timeout-seconds = 0
      }
    }
  }
]
